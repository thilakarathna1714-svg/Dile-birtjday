<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dile! 🌸✨</title>
    <!-- Importing Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body, html { 
            margin: 0; padding: 0; background-color: #fff0f5; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }
        
        /* Modern Gradient Click Overlay */
        .click-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; cursor: pointer; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .click-overlay h2 { font-size: 1.8em; font-weight: 600; text-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 12px; padding: 0 20px; }
        .click-overlay p { font-size: 1.05em; background: rgba(255,255,255,0.25); padding: 12px 24px; border-radius: 30px; margin: 0 20px; backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .bounce-heart { font-size: 4.5em; animation: bounce 0.8s infinite alternate; margin-bottom: 20px; }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        /* Media Presentation Container */
        .media-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; justify-content: center; align-items: center; background: #fff5f7; }
        .slide { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; justify-content: center; align-items: center; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: contain; filter: contrast(106%) saturate(125%) brightness(102%); }

        /* Floating Heart Bubbles Animation */
        .floating-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2; overflow: hidden; }
        .heart-bubble { position: absolute; bottom: -10%; background: rgba(255, 105, 180, 0.45); border-radius: 50%; animation: floatUp 6s infinite linear; display: flex; justify-content: center; align-items: center; color: white; font-size: 12px; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; } 30% { opacity: 0.8; } 90% { opacity: 0.4; } 100% { transform: translateY(-115vh) rotate(360deg) scale(1.2); opacity: 0; } }

        /* Elegant Top Header */
        .header-content { position: absolute; top: 4%; display: flex; flex-direction: column; align-items: center; z-index: 3; text-align: center; width: 100%; }
        .header-card { background: rgba(255, 255, 255, 0.88); padding: 10px 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(255, 105, 180, 0.12); border: 1px solid rgba(255, 182, 193, 0.6); backdrop-filter: blur(8px); }
        h1 { font-size: 1.5em; margin: 0; color: #d93d6c; font-weight: 600; letter-spacing: 0.5px; }

        /* Redesigned Story Text Container with Premium Font Styles */
        .story-container { position: absolute; bottom: 8%; width: 92%; max-width: 550px; text-align: center; z-index: 3; }
        .story-text { 
            font-size: 1.15em; 
            font-weight: 500; 
            font-style: italic;
            color: #c92a57; 
            line-height: 1.6; 
            background: rgba(255, 255, 255, 0.94); 
            padding: 18px 25px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 105, 180, 0.25); 
            box-shadow: 0 12px 30px rgba(233, 30, 99, 0.15); 
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%; 
            letter-spacing: 0.2px;
        }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Ending Screen Design */
        .ending-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); z-index: 4; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .ending-card { background: rgba(255, 255, 255, 0.94); padding: 35px 25px; border-radius: 32px; box-shadow: 0 20px 45px rgba(0,0,0,0.12); border: 1px solid #ffffff; max-width: 85%; backdrop-filter: blur(10px); }
        .big-emoji { font-size: 4.5em; animation: swing 2.5s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        .thank-you-msg { font-size: 1.55em; font-weight: 600; color: #d93d6c; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Calm & Deeply Romantic Soft Acoustic Background Music -->
    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" loop></audio>

    <div id="starter-overlay" class="click-overlay" onclick="startSurprise()">
        <div class="bounce-heart">💝</div>
        <h2>Dile වෙනුවෙන් සකස් කරපු Surprise එක!</h2>
        <p>සින්දුවත් එක්කම ලස්සනට බලන්න මෙතන Click කරන්න ✨</p>
    </div>

    <div class="media-container">
        <div class="slide"><video id="intro-video" src="video_2026-07-06_21-39-03.mp4" muted autoplay playsinline></video></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-29.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-30.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31 (2).jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32 (2).jpg"></div>
        <div class="slide"><img src="PXL_20260306_053013517.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_053245785.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_060254045.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="IMG_2315.JPG"></div>
        <div class="slide"><img src="IMG_2315 - Copy.JPG"></div>
    </div>
    
    <div class="floating-bg" id="bubble-deck"></div>

    <div class="header-content">
        <div class="header-card">
            <h1>Happy Birthday Dile! 🌸✨</h1>
        </div>
    </div>

    <div class="story-container">
        <div id="story-display" class="story-text">Loading...</div>
    </div>

    <div id="ending" class="ending-screen">
        <div class="ending-card">
            <div class="big-emoji">🥰👸🌸</div>
            <div class="thank-you-msg">Thank You For Everything, My Love! ❤️</div>
            <p style="color: #ff6384; font-weight: 600; margin-top: 10px; font-size: 1.1em;">උපන්දිනයක් වේවා මගේ පණ! 🎂</p>
        </div>
    </div>

    <script>
        const loveStory = [
            "मुළු ලෝකයම නිහඬ වුණු මොහොතක, ඔයා මගේ ජීවිතයට ආවා... ✨",
            "ඔයාගේ ඔය ලස්සන හිනාව තමයි මගේ හැම දවසකම සතුට...",
            "සෑම පින්තූරයකම තියෙන්නේ අපි එකතු කරපු ආදරණීය මතකයන්...",
            "ජීවිතේ මට ලැබුණු වටිනාම සහ ලස්සනම තෑග්ග ඔයා විතරයි, Dile...",
            "ඔයා මගේ ළඟින් ඉන්න හැම තත්පරයක්ම මට මාරම විශේෂයි...",
            "කවදාවත් කාටවත්ම වෙනස් කරන්න බැරි තරම් මම ඔයාට ආදරෙයි...",
            "මගේ හුස්ම වැටෙන හැම වාරයක් පාසාම මම ඔයාවම පතනවා...",
            "අපි ආපු මේ දුර දිහා බලද්දී හිතට දැනෙන්නේ පුදුමාකාර සතුටක්...",
            "ඔයා නැති ලෝකයක් ගැන මට හිතන්නවත් බැරි තරම් ඔයා මගේ වෙලා...",
            "හැමදාම ඔහොම මගේම වෙලා මගේ hෙවනැල්ල වගේ ළඟින් ඉන්න...",
            "උපදින හැම ආත්මයකම ඔයාම මගේ වෙන්න කියලා මම පතනවා...",
            "නිදුක් නිරෝගී සතුට පිරුණු ලස්සනම උපන්දිනයක් වේවා මගේ පණ! 🎂❤️"
        ];

        let currentSlide = 0;
        let slideTimeout;
        const slides = document.getElementsByClassName("slide");
        const storyDisplay = document.getElementById("story-display");
        const bgMusic = document.getElementById("bg-music");
        const video = document.getElementById("intro-video");
        const overlay = document.getElementById("starter-overlay");

        // Generate customized floating heart bubbles
        const bubbleDeck = document.getElementById("bubble-deck");
        for (let i = 0; i < 20; i++) {
            let bubble = document.createElement("div");
            bubble.className = "heart-bubble";
            bubble.innerHTML = "❤";
            bubble.style.left = Math.random() * 100 + "%";
            bubble.style.fontSize = (Math.random() * 12 + 8) + "px";
            bubble.style.animationDelay = Math.random() * 6 + "s";
            bubble.style.animationDuration = (Math.random() * 5 + 4) + "s";
            bubbleDeck.appendChild(bubble);
        }

        function startSurprise() {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 600);
            bgMusic.volume = 0.85; // Set smooth volume
            bgMusic.play().catch(e => console.log("Audio playing requires interaction first."));
            runPresentation();
        }

        function runPresentation() {
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slides[currentSlide].style.display = "flex";
            storyDisplay.innerHTML = loveStory[currentSlide];

            storyDisplay.style.animation = 'none';
            storyDisplay.offsetHeight; // trigger reflow
            storyDisplay.style.animation = null;

            if (currentSlide === 0) {
                video.currentTime = 0;
                const playPromise = video.play();
                slideTimeout = setTimeout(nextSlide, 6000); // Fail-safe timer

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        video.onended = function() {
                            clearTimeout(slideTimeout);
                            nextSlide();
                        };
                    }).catch(error => {
                        console.log("Autoplay handled by safety timer.");
                    });
                }
            } else {
                slideTimeout = setTimeout(nextSlide, 5200);
            }
        }

        function nextSlide() {
            clearTimeout(slideTimeout);
            currentSlide++;
            if (currentSlide < slides.length) {
                runPresentation();
            } else {
                document.getElementById("ending").style.display = "flex";
            }
        }
    </script>
</body>
</html>
