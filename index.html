<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dile! 🌸✨</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: #fff0f5; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .click-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; cursor: pointer; transition: opacity 0.5s ease;
        }
        .click-overlay h2 { font-size: 1.8em; text-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 10px; padding: 0 15px; }
        .click-overlay p { font-size: 1.1em; background: rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 20px; margin: 0 15px; }
        .bounce-heart { font-size: 4em; animation: bounce 1s infinite alternate; margin-bottom: 15px; }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        .media-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; justify-content: center; align-items: center; background: #fff5f7; }
        .slide { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; justify-content: center; align-items: center; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: contain; filter: contrast(115%) saturate(145%) brightness(102%); }

        .floating-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2; overflow: hidden; }
        .heart-bubble { position: absolute; bottom: -10%; background: rgba(255, 182, 193, 0.6); border-radius: 50%; animation: floatUp 6s infinite linear; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-110vh) scale(1.2); opacity: 0; } }

        .header-content { position: absolute; top: 5%; display: flex; flex-direction: column; align-items: center; z-index: 3; text-align: center; width: 100%; }
        .header-card { background: rgba(255, 255, 255, 0.85); padding: 8px 20px; border-radius: 30px; box-shadow: 0 8px 20px rgba(255, 105, 180, 0.15); border: 2px solid #ffb6c1; }
        h1 { font-size: 1.6em; margin: 0; color: #ff477e; font-weight: 700; }

        .story-container { position: absolute; bottom: 8%; width: 90%; max-width: 600px; text-align: center; z-index: 3; }
        .story-text { font-size: 1.2em; font-weight: 500; color: #ff477e; line-height: 1.5; background: rgba(255, 255, 255, 0.95); padding: 15px 20px; border-radius: 20px; border: 3px dashed #ffb6c1; box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 100%; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .ending-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); z-index: 4; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .ending-card { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 3px solid #ffffff; max-width: 85%; }
        .big-emoji { font-size: 4em; animation: swing 2s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        .thank-you-msg { font-size: 1.6em; font-weight: 700; color: #ff477e; margin-top: 15px; }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div id="starter-overlay" class="click-overlay" onclick="startSurprise()">
        <div class="bounce-heart">💝</div>
        <h2>Dile වෙනුවෙන් සකස් කරපු Surprise එක!</h2>
        <p>සින්දුවත් එක්කම ලස්සනට බලන්න මෙතන Click කරන්න ✨</p>
    </div>

    <div class="media-container">
        <!-- Added explicit muted, autoplay, and playsinline to bypass browser restrictions -->
        <div class="slide"><video id="intro-video" src="video_2026-07-06_21-39-03.mp4" muted autoplay playsinline></video></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-29.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-30.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31 (2).jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32 (2).jpg"></div>
        <div class="slide"><img src="PXL_20260306_053013517.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_053245785.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_060254045.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="IMG_2315.JPG"></div>
        <div class="slide"><img src="IMG_2315 - Copy.JPG"></div>
    </div>
    
    <div class="floating-bg" id="bubble-deck"></div>

    <div class="header-content">
        <div class="header-card">
            <h1>Happy Birthday Dile! 🌸✨</h1>
        </div>
    </div>

    <div class="story-container">
        <div id="story-display" class="story-text">Loading...</div>
    </div>

    <div id="ending" class="ending-screen">
        <div class="ending-card">
            <div class="big-emoji">🥰👸🌸</div>
            <div class="thank-you-msg">Thank You For Everything, My Love! ❤️</div>
            <p style="color: #ff7597; font-weight: bold; margin-top: 10px;">උපන්දිනයක් වේවා මගේ පණ! 🎂</p>
        </div>
    </div>

    <script>
        const loveStory = [
            "मुළු ලෝකයම නිහඬ වුණු මොහොතක, ඔයා මගේ ජීවිතයට ආවා... ✨",
            "ඔයාගේ ඔය ලස්සන හිනාව තමයි මගේ හැම දවසකම සතුට...",
            "සෑම පින්තූරයකම තියෙන්නේ අපි එකතු කරපු ආදරණීය මතකයන්...",
            "ජීවිතේ මට ලැබුණු වටිනාම සහ ලස්සනම තෑග්ග ඔයා විතරයි, Dile...",
            "ඔයා මගේ ළඟින් ඉන්න හැම තත්පරයක්ම මට මාරම විශේෂයි...",
            "කවදාවත් කාටවත්ම වෙනස් කරන්න බැරි තරම් මම ඔයාට ආදරෙයි...",
            "මගේ හුස්ම වැටෙන හැම වාරයක් පාසාම මම ඔයාවම පතනවා...",
            "අපි ආපු මේ දුර දිහා බලද්දී හිතට දැනෙන්නේ පුදුමාකාර සතුටක්...",
            "ඔයා නැති ලෝකයක් ගැන මට හිතන්නවත් බැරි තරම් ඔයා මගේ වෙලා...",
            "හැමදාම ඔහොම මගේම වෙලා මගේ හෙවනැල්ල වගේ ළඟින් ඉන්න...",
            "උපදින හැම ආත්මයකම ඔයාම මගේ වෙන්න කියලා මම පතනවා...",
            "නිදුක් නිරෝගී සතුට පිරුණු ලස්සනම උපන්දිනයක් වේවා මගේ පණ! 🎂❤️"
        ];

        let currentSlide = 0;
        let slideTimeout;
        const slides = document.getElementsByClassName("slide");
        const storyDisplay = document.getElementById("story-display");
        const bgMusic = document.getElementById("bg-music");
        const video = document.getElementById("intro-video");
        const overlay = document.getElementById("starter-overlay");

        // Generate floating hearts
        const bubbleDeck = document.getElementById("bubble-deck");
        for (let i = 0; i < 15; i++) {
            let bubble = document.createElement("div");
            bubble.className = "heart-bubble";
            bubble.style.left = Math.random() * 100 + "%";
            bubble.style.width = bubble.style.height = (Math.random() * 20 + 10) + "px";
            bubble.style.animationDelay = Math.random() * 5 + "s";
            bubble.style.animationDuration = (Math.random() * 4 + 4) + "s";
            bubbleDeck.appendChild(bubble);
        }

        function startSurprise() {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 500);
            bgMusic.play().catch(e => console.log("Audio playing required interaction first."));
            runPresentation();
        }

        function runPresentation() {
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slides[currentSlide].style.display = "flex";
            storyDisplay.innerHTML = loveStory[currentSlide];

            storyDisplay.style.animation = 'none';
            storyDisplay.offsetHeight; // trigger reflow
            storyDisplay.style.animation = null;

            if (currentSlide === 0) {
                // Ensure video attempts to play immediately
                video.currentTime = 0;
                const playPromise = video.play();
                
                // Set a fail-safe timer (6 seconds) so if the video stalls, it forces transition to photo1
                slideTimeout = setTimeout(nextSlide, 6000);

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        video.onended = function() {
                            clearTimeout(slideTimeout);
                            nextSlide();
                        };
                    }).catch(error => {
                        console.log("Autoplay caught, handled by safety timer.");
                    });
                }
            } else {
                slideTimeout = setTimeout(nextSlide, 5000);
            }
        }

        function nextSlide() {
            clearTimeout(slideTimeout);
            currentSlide++;
            if (currentSlide < slides.length) {
                runPresentation();
            } else {
                document.getElementById("ending").style.display = "flex";
            }
        }
    </script>
</body>
</html>
