<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Dile! 🌸✨</title>
    <!-- Premium Font Family -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body, html { 
            margin: 0; padding: 0; background-color: #1a1a2e; /* Darker background for cinematic pop */
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }
        
        /* Modern Gradient Click Overlay */
        .click-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; cursor: pointer; transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .click-overlay h2 { font-size: 1.8em; font-weight: 700; text-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 12px; padding: 0 20px; }
        .click-overlay p { font-size: 1.05em; background: rgba(255,255,255,0.25); padding: 12px 24px; border-radius: 30px; margin: 0 20px; backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .bounce-heart { font-size: 4.5em; animation: bounce 0.8s infinite alternate; margin-bottom: 20px; }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }

        /* Media Presentation Container */
        .media-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        
        /* Heart-touching Transition Fade Style */
        .slide { 
            display: none; width: 100%; height: 100%; position: absolute; 
            top: 0; left: 0; justify-content: center; align-items: center; 
            opacity: 0; transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }
        .slide.active { display: flex; opacity: 1; }

        .slide img { 
            width: 100%; height: 100%; object-fit: contain; 
            filter: contrast(110%) saturate(120%) brightness(105%);
            will-change: transform;
        }

        /* --- ADVANCED PHOTO EFFECTS --- */
        /* Effect 1: Fast Zoom & Multi-directional Shake */
        .effect-zoom-shake { animation: zoomShakeFast 4s ease-in-out infinite alternate !important; }
        @keyframes zoomShakeFast {
            0% { transform: scale(1) rotate(0deg) translate(0, 0); }
            25% { transform: scale(1.08) rotate(1.5deg) translate(2px, -2px); }
            50% { transform: scale(1.15) rotate(-1.5deg) translate(-2px, 2px); }
            75% { transform: scale(1.22) rotate(1deg) translate(2px, 2px); }
            100% { transform: scale(1.3) rotate(-1deg) translate(-2px, -2px); }
        }

        /* Effect 2: Cinematic Pan & Glide */
        .effect-pan { animation: cinematicPan 5.5s linear infinite alternate !important; }
        @keyframes cinematicPan {
            0% { transform: scale(1.2) translateX(-3%); }
            100% { transform: scale(1.3) translateX(3%); }
        }

        /* Effect 3: Heartbeat Pulse Shake */
        .effect-heartbeat { animation: heartbeatPulse 2.5s ease-in-out infinite !important; }
        @keyframes heartbeatPulse {
            0% { transform: scale(1) rotate(0deg); }
            15% { transform: scale(1.15) rotate(3deg); }
            30% { transform: scale(1.05) rotate(-2deg); }
            45% { transform: scale(1.15) rotate(2deg); }
            100% { transform: scale(1.08) rotate(0deg); }
        }

        /* Effect 4: Smooth Zoom Out + Rotate */
        .effect-zoom-out { animation: zoomOutRotate 5s ease-in-out infinite alternate !important; }
        @keyframes zoomOutRotate {
            0% { transform: scale(1.35) rotate(3deg); }
            100% { transform: scale(1) rotate(-2deg); }
        }

        /* --- ADVANCED VIDEO EFFECTS --- */
        .slide video { 
            width: 100%; height: 100%; object-fit: contain; 
            animation: videoGlowPulse 4s infinite alternate;
        }
        @keyframes videoGlowPulse {
            0% { filter: contrast(105%) brightness(1) drop-shadow(0 0 10px rgba(255, 105, 180, 0.3)); transform: scale(1); }
            100% { filter: contrast(115%) brightness(1.1) drop-shadow(0 0 30px rgba(255, 20, 147, 0.7)); transform: scale(1.02); }
        }

        /* Floating Heart Bubbles */
        .floating-bg { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2; overflow: hidden; }
        .heart-bubble { position: absolute; bottom: -10%; background: rgba(255, 105, 180, 0.55); border-radius: 50%; animation: floatUp 5s infinite linear; display: flex; justify-content: center; align-items: center; color: white; font-size: 14px; box-shadow: 0 0 10px rgba(255, 105, 180, 0.5); }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; } 30% { opacity: 1; } 90% { opacity: 0.5; } 100% { transform: translateY(-115vh) rotate(360deg) scale(1.3); opacity: 0; } }

        /* Top Header */
        .header-content { position: absolute; top: 4%; display: flex; flex-direction: column; align-items: center; z-index: 3; text-align: center; width: 100%; }
        .header-card { background: rgba(255, 255, 255, 0.9); padding: 10px 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255, 20, 147, 0.4); border: 2px solid rgba(255, 105, 180, 0.8); backdrop-filter: blur(10px); }
        h1 { font-size: 1.6em; margin: 0; color: #d93d6c; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

        /* Bold & Beautifully Highlighted Story Text Box */
        .story-container { position: absolute; bottom: 8%; width: 92%; max-width: 600px; text-align: center; z-index: 3; }
        .story-text { 
            font-size: 1.3em; 
            font-weight: 700; 
            color: #1a000d; 
            line-height: 1.6; 
            background: rgba(255, 255, 255, 0.92); 
            padding: 22px 30px; 
            border-radius: 20px; 
            border-bottom: 6px solid #ff477e; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); 
            animation: textPopIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            width: 100%; 
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(255, 105, 180, 0.2);
        }
        @keyframes textPopIn { 0% { transform: translateY(30px) scale(0.9); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }

        /* Ending Screen Design */
        .ending-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #ff7eb3 0%, #d93d6c 100%); z-index: 4; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .ending-card { background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); border: 2px solid #fff; max-width: 85%; backdrop-filter: blur(15px); }
        .big-emoji { font-size: 5em; animation: swing 2.5s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg) scale(1); } 50% { transform: rotate(10deg) scale(1.1); } }
        .thank-you-msg { font-size: 1.8em; font-weight: 700; color: #b51a44; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <audio id="bg-music" src="romantic.mp3" loop></audio>

    <div id="starter-overlay" class="click-overlay" onclick="startSurprise()">
        <div class="bounce-heart">💝</div>
        <h2>Dile වෙනුවෙන් සකස් කරපු Surprise එක!</h2>
        <p>සින්දුවත් එක්කම බලන්න මෙතන Click කරන්න ✨</p>
    </div>

    <div class="media-container">
        <div class="slide"><video id="intro-video" src="video_2026-07-06_21-39-03.mp4" muted autoplay playsinline></video></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-29.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-30.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-31 (2).jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32.jpg"></div>
        <div class="slide"><img src="photo_2026-07-06_21-30-32 (2).jpg"></div>
        <div class="slide"><img src="PXL_20260306_053013517.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_053245785.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="PXL_20260306_060254045.PORTRAIT~2.jpg"></div>
        <div class="slide"><img src="IMG_2315.JPG"></div>
        <div class="slide"><img src="IMG_2315 - Copy.JPG"></div>
    </div>
    
    <div class="floating-bg" id="bubble-deck"></div>

    <div class="header-content">
        <div class="header-card">
            <h1>Happy Birthday Dile! 🌸✨</h1>
        </div>
    </div>

    <div class="story-container">
        <div id="story-display" class="story-text">Loading...</div>
    </div>

    <div id="ending" class="ending-screen">
        <div class="ending-card">
            <div class="big-emoji">🥰👸🌸</div>
            <div class="thank-you-msg">Thank You For Everything! ❤️</div>
            <p style="color: #ff477e; font-weight: 700; margin-top: 15px; font-size: 1.3em;">උපන්දිනයක් වේවා Mගේ පණ! 🎂</p>
        </div>
    </div>

    <script>
        const loveStory = [
            "मुළු ලෝකයම නිහඬ වුණු මොහොතක, ඔයා මගේ ජීවිතයට ආවා... ✨",
            "ඔයාගේ ඔය ලස්සන හිනාව තමයි මගේ හැම දවසකම සතුට...",
            "සෑම පින්තූරයකම තියෙන්නේ අපි එකතු කරපු ආදරණීය මතකයන්...",
            "ජීවිතේ මට ලැබුණු වටිනාම සහ ලස්සනම තෑග්ග ඔයා විතරයි, Dile...",
            "ඔයා මගේ ළඟින් ඉන්න හැම තත්පරයක්ම මට මාරම විශේෂයි...",
            "කවදාවත් කාටවත්ම වෙනස් කරන්න බැරි තරම් මම ඔයාට ආදරෙයි...",
            "මගේ හුස්ම වැටෙන හැම වාරයක් පාසාම මම ඔයාවම පතනවා...",
            "අපි ආපු මේ දුර දිහා බලද්දී හිතට දැනෙන්නේ පුදුමාකාර සතුටක්...",
            "ඔයා නැති ලෝකයක් ගැන මට හිතන්නවත් බැරි තරම් ඔයා මගේ වෙලා...",
            "හැමදාම ඔහොම මගේම වෙලා මගේ හෙවනැල්ල වගේ ළඟින් ඉන්න...",
            "උපදින හැම ආත්මයකම ඔයාම මගේ වෙන්න කියලා මම පතනවා...",
            "නිදුක් නිරෝගී සතුට පිරුණු ලස්සනම උපන්දිනයක් වේවා මගේ පණ! 🎂❤️"
        ];

        let currentSlide = 0;
        let slideTimeout;
        const slides = document.getElementsByClassName("slide");
        const storyDisplay = document.getElementById("story-display");
        const bgMusic = document.getElementById("bg-music");
        const video = document.getElementById("intro-video");
        const overlay = document.getElementById("starter-overlay");
        
        // Array of dynamic effects for photos
        const visualEffects = ['effect-zoom-shake', 'effect-pan', 'effect-heartbeat', 'effect-zoom-out'];

        // Floating hearts
        const bubbleDeck = document.getElementById("bubble-deck");
        for (let i = 0; i < 25; i++) {
            let bubble = document.createElement("div");
            bubble.className = "heart-bubble";
            bubble.innerHTML = "❤";
            bubble.style.left = Math.random() * 100 + "%";
            bubble.style.fontSize = (Math.random() * 15 + 10) + "px";
            bubble.style.animationDelay = Math.random() * 5 + "s";
            bubble.style.animationDuration = (Math.random() * 4 + 3) + "s";
            bubbleDeck.appendChild(bubble);
        }

        function startSurprise() {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 700);
            bgMusic.volume = 1.0; 
            bgMusic.play().catch(e => console.log("Audio started."));
            runPresentation();
        }

        function runPresentation() {
            // Remove active class and clear previous photo effects
            for (let i = 0; i < slides.length; i++) { 
                slides[i].classList.remove("active"); 
                let img = slides[i].querySelector('img');
                if (img) { img.className = ''; } // Clear effects
            }
            
            slides[currentSlide].classList.add("active");
            
            // Add a random dynamic effect if it's a photo
            let currentImg = slides[currentSlide].querySelector('img');
            if (currentImg) {
                let randomEffect = visualEffects[Math.floor(Math.random() * visualEffects.length)];
                currentImg.classList.add(randomEffect);
            }

            storyDisplay.innerHTML = loveStory[currentSlide];

            // Re-trigger text popIn animation
            storyDisplay.style.animation = 'none';
            storyDisplay.offsetHeight; 
            storyDisplay.style.animation = null;

            if (currentSlide === 0) {
                video.currentTime = 0;
                const playPromise = video.play();
                slideTimeout = setTimeout(nextSlide, 6500);

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        video.onended = function() {
                            clearTimeout(slideTimeout);
                            nextSlide();
                        };
                    }).catch(error => console.log("Autoplay handled."));
                }
            } else {
                slideTimeout = setTimeout(nextSlide, 5000); // 5 seconds per photo for faster pacing
            }
        }

        function nextSlide() {
            clearTimeout(slideTimeout);
            currentSlide++;
            if (currentSlide < slides.length) {
                runPresentation();
            } else {
                document.getElementById("ending").style.display = "flex";
            }
        }
    </script>
</body>
</html>
