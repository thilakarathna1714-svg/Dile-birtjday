    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: #050505; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .media-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; display: flex; justify-content: center; align-items: center; background-color: #000;
        }
        .slide { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: contain; filter: brightness(0.5) contrast(1.1); }
        .active-photo img { animation: slowMoveEffect 8s ease-in-out infinite alternate; }
        @keyframes slowMoveEffect { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 90%); z-index: 2; pointer-events: none; }
        .header-content { position: absolute; top: 6%; display: flex; flex-direction: column; align-items: center; z-index: 3; text-align: center; width: 100%; }
        .heart { width: 45px; height: 45px; background-color: #ff3366; position: relative; transform: rotate(-45deg); animation: beat 0.8s infinite alternate; box-shadow: 0 0 25px #ff3366; margin-bottom: 15px; }
        .heart:before, .heart:after { content: ""; width: 45px; height: 45px; background-color: #ff3366; border-radius: 50%; position: absolute; }
        .heart:before { top: -22.5px; left: 0; } .heart:after { top: 0; left: 22.5px; }
        @keyframes beat { 0% { transform: scale(0.9) rotate(-45deg); } 100% { transform: scale(1.1) rotate(-45deg); } }
        h1 { font-size: 2.5em; margin: 0; text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9), 0 0 20px #ff3366; font-weight: 700; letter-spacing: 1px; }
        .story-container { position: absolute; bottom: 8%; width: 90%; max-width: 650px; text-align: center; z-index: 3; display: flex; justify-content: center; align-items: center; }
        .story-text { font-size: 1.4em; font-weight: 400; color: #fff0f5; text-shadow: 0 0 10px rgba(255, 51, 102, 0.6), 0 2px 12px rgba(0, 0, 0, 0.9); line-height: 1.5; background: rgba(15, 15, 15, 0.85); padding: 15px 30px; border-radius: 25px; border: 2px solid #ff3366; box-shadow: 0 0 20px rgba(255, 51, 102, 0.4); animation: glowFadeIn 1.2s ease-in-out; width: 100%; }
        @keyframes glowFadeIn { from { opacity: 0; transform: translateY(15px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .ending-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #050505; z-index: 4; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .emoji-build { font-size: 6em; animation: bounceEmoji 1.5s infinite alternate, scaleUp 2s ease-out; margin-bottom: 20px; text-shadow: 0 0 30px rgba(255,204,0,0.6); }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounceEmoji { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        .thank-you-msg { font-size: 2.2em; font-weight: 600; color: #ffffff; text-shadow: 0 0 20px #ff3366, 0 2px 10px rgba(0,0,0,0.5); animation: fadeInUp 2.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        const loveStory = [
            "මුළු ලෝකයම නිහඬ වුණු මොහොතක, ඔයා මගේ ජීවිතයට ආවා... ✨",
            "ඔයාගේ ඔය ලස්සන hිනාව තමයි මගේ හැම දවසකම සතුට...",
            "සෑම පින්තූරයකම තියෙන්නේ අපි එකතු කරපු ආදරණීය මතකයන්...",
            "ජීවිතේ මට ලැබුණු වටිනාම සහ ලස්සනම තෑග්ග ඔයා විතරයි, Dile...",
            "ඔයා මගේ ළඟින් ඉන්න හැම තත්පරයක්ම මට මාරම විශේෂයි...",
            "කවදාවත් කාටවත්ම වෙනස් කරන්න බැරි තරම් මම ඔයාට ආදරෙයි...",
            "මගේ හුස්ම වැටෙන හැම වාරයක් පාසාම මම ඔයාවම පතනවා...",
            "අපි ආපු මේ දුර දිහා බලද්දී hිතට දැනෙන්නේ පුදුමාකාර සතුටක්...",
            "ඔයා නැති ලෝකයක් ගැන මට හිතන්නවත් බැරි තරම් ඔයා මගේ වෙලා...",
            "හැමදාම ඔහොම මගේම වෙලා මගේ හෙවනැල්ල වගේ ළඟින් ඉන්න...",
            "උපදින හැම ආත්මයකම ඔයාම මගේ වෙන්න කියලා මම පතනවා...",
            "නිදුක් නිරෝගී සතුට පිරුණු ලස්සනම උපන්දිනයක් වේවා මගේ පණ! 🎂❤️"
        ];

        let currentSlide = 0;
        const slides = document.getElementsByClassName("slide");
        const storyDisplay = document.getElementById("story-display");
        const bgMusic = document.getElementById("bg-music");
        const video = document.getElementById("intro-video");
        const endingScreen = document.getElementById("ending");
        let interactionDone = false;

        document.body.addEventListener("click", function() {
            if (!interactionDone) {
                interactionDone = true;
                bgMusic.play().catch(e => console.log("Music play blocked: ", e));
                runPresentation();
            }
        });

        function runPresentation() {
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slides[currentSlide].style.display = "block";
            storyDisplay.innerHTML = loveStory[currentSlide];
            storyDisplay.style.animation = 'none';
            storyDisplay.offsetHeight;
            storyDisplay.style.animation = null;

            if (currentSlide === 0) {
                video.currentTime = 0;
                video.play();
                video.onended = function() { nextSlide(); };
            } else {
                setTimeout(nextSlide, 5000);
            }
        }

        function nextSlide() {
            currentSlide++;
            if (currentSlide < slides.length) {
                runPresentation();
            } else {
                endingScreen.style.display = "flex";
            }
        }
    </script>
